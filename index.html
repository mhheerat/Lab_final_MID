<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>National Technology Workshop Registration</h2>

    <form id="registrationForm">

        <label for="firstName">First Name</label>
        <input type="text" id="firstName">
        <div class="error" id="firstNameError"></div>

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName">
        <div class="error" id="lastNameError"></div>

        <label for="email">Email</label>
        <input type="email" id="email">
        <div class="error" id="emailError"></div>

        <label for="password">Password</label>
        <input type="password" id="password">
        <div class="error" id="passwordError"></div>

        <label>Gender</label>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <div class="error" id="genderError"></div>

        <label>Interests</label>
        <input type="checkbox" name="interest" value="AI"> AI
        <input type="checkbox" name="interest" value="Web Development"> Web Development
        <input type="checkbox" name="interest" value="Cyber Security"> Cyber Security
        <div class="error" id="interestError"></div>

        <label for="department">Department</label>
        <select id="department">
            <option value="">Select Department</option>
            <option>CSE</option>
            <option>EEE</option>
            <option>BBA</option>
            <option>English</option>
        </select>
        <div class="error" id="departmentError"></div>

        <label for="about">About Yourself</label>
        <textarea id="about"></textarea>
        <div class="error" id="aboutError"></div>

        <br><br>

        <button type="submit">Register</button>

    </form>

    <div id="successMessage"></div>

</div>

<script src="script.js"></script>

</body>
</html>
